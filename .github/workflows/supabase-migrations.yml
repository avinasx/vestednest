name: Supabase Migrations

# Applies database migrations to the linked Supabase project on every push to
# main (and on manual dispatch). `supabase db push` is idempotent: it runs every
# time and is a no-op when there are no new migrations to apply.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid concurrent migration runs racing against the same database.
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      # Single required secret: the full Postgres connection string.
      #   SUPABASE_DB_URL -> Project > Settings > Database > Connection string
      #   (includes host + password; use the direct or session-pooler URI)
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push database migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL"
